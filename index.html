<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Queue</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#070913" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero card">
      <div>
        <p class="eyebrow">review.md</p>
        <h1>投稿レビュー</h1>
        <p class="hero-copy">採用するものだけチェック。修正はファイルで行い、ここでは選ぶだけ。</p>
      </div>
      <div class="pending-pill" aria-live="polite">
        <span id="pendingCount">--</span>
        <small>件待ち</small>
      </div>
    </header>

    <section class="status-grid" aria-label="状態">
      <article class="status-card card">
        <p class="eyebrow">stock</p>
        <strong id="stockCount">--</strong>
        <span>件</span>
      </article>
      <article class="status-card card">
        <p class="eyebrow">status</p>
        <strong id="reviewStatus">読込中</strong>
      </article>
    </section>

    <section class="review-panel card" aria-labelledby="reviewTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">pending review</p>
          <h2 id="reviewTitle">候補投稿</h2>
        </div>
        <button id="refreshButton" class="quiet-button" type="button">再読込</button>
      </div>

      <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
      <div id="postList" class="post-list"></div>

      <button id="completeButton" class="primary-button" type="button" disabled>
        レビュー完了
      </button>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostPilot</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#050814" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar glass">
      <div class="brand">Post<span>Pilot</span></div>
      <nav class="nav">
        <button class="nav-item active" data-view="composer">Composer</button>
        <button class="nav-item" data-view="queue">Queue</button>
        <button class="nav-item" data-view="settings">Settings</button>
      </nav>
      <section class="account-mini">
        <p class="label">Accounts</p>
        <div id="sidebarAccounts"></div>
      </section>
    </aside>

    <main class="main">
      <section class="hero glass">
        <div>
          <p class="label">Next scheduled post</p>
          <h1>次の固定枠に、そのまま置く。</h1>
        </div>
        <div class="next-slot" id="heroNextSlot"></div>
      </section>

      <section class="view active" id="composerView">
        <div class="composer-grid">
          <section class="composer glass">
            <div class="section-head">
              <p class="label">Composer</p>
              <div id="accountChips" class="chip-row"></div>
            </div>

            <textarea id="postText" placeholder="投稿文を書く"></textarea>

            <div class="media-row">
              <label class="media-button" for="imageInput">画像を追加</label>
              <input id="imageInput" type="file" accept="image/*" multiple hidden />
              <div class="media-hint" id="mediaHint">画像なし</div>
            </div>

            <div id="imageStrip" class="image-strip"></div>

            <div class="schedule-row">
              <div>
                <p class="label">Schedule</p>
                <strong id="autoSchedule"></strong>
              </div>
              <label class="manual-toggle">
                <input type="checkbox" id="manualToggle" />
                手動指定
              </label>
            </div>

            <div class="manual-picker hidden" id="manualPicker">
              <input type="datetime-local" id="manualDateTime" />
            </div>

            <button class="primary" id="reserveButton">次の固定枠で予約</button>
          </section>

          <aside class="preview glass">
            <p class="label">Live Preview</p>
            <div class="tweet-card">
              <div class="tweet-account" id="previewAccount"></div>
              <div class="tweet-body" id="previewText"></div>
              <div id="previewImages" class="preview-images"></div>
            </div>
          </aside>
        </div>
      </section>

      <section class="view" id="queueView">
        <section class="panel glass">
          <div class="section-head">
            <p class="label">Queue</p>
            <strong id="queueCount"></strong>
          </div>
          <div id="queueList" class="queue-list"></div>
        </section>
      </section>

      <section class="view" id="settingsView">
        <section class="panel glass">
          <div class="section-head">
            <p class="label">Fixed slots</p>
          </div>
          <div id="slotSettings" class="slot-settings"></div>
        </section>
      </section>
    </main>

    <aside class="right-rail">
      <section class="rail-card glass">
        <p class="label">Posting slots</p>
        <div id="slotRail" class="slot-list"></div>
      </section>
      <section class="rail-card glass">
        <p class="label">Rule</p>
        <p class="muted">日時未指定なら、そのアカウントの次の空き固定枠へ。埋まっていれば、その次の枠へ送る。</p>
      </section>
    </aside>

    <nav class="bottom-nav glass">
      <button class="bottom-item active" data-view="composer">作成</button>
      <button class="bottom-item" data-view="queue">予約</button>
      <button class="bottom-item" data-view="settings">設定</button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
